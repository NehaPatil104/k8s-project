# =============================================================================
# ci.yaml — Continuous Integration Pipeline
#
# Triggers on:
#   - Push to main/develop that changes reviews-service code
#   - Pull requests to main
#
# What it does:
#   1. Run tests with coverage
#   2. Build Docker image
#   3. Push to Docker Hub
#   4. Update image tag in Helm values.yaml
#   5. Push updated values.yaml back to git (triggers ArgoCD)
# =============================================================================

name: CI — Reviews Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'reviews-service/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'reviews-service/**'

env:
  IMAGE_NAME: nehapatil104/reviews-service
  HELM_VALUES_PATH: kind/helm/ecommerce/values.yaml

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # FIX: removed cache-dependency-path — package-lock.json is generated
          # by npm install, not committed to git. Cache by package.json instead.
          cache: 'npm'
          cache-dependency-path: reviews-service/package.json

      - name: Install dependencies
        working-directory: reviews-service
        # FIX: use npm install instead of npm ci
        # npm ci requires package-lock.json to exist — npm install creates it
        run: npm install

      - name: Run tests with coverage
        working-directory: reviews-service
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        # FIX: only upload if coverage folder exists
        if: always()
        with:
          name: coverage-report
          path: reviews-service/coverage/
          if-no-files-found: warn   # warn instead of error if no coverage files

  # ── Job 2: Build & Push ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: reviews-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

  # ── Job 3: Update Helm Values ────────────────────────────────────────────────
  update-helm-values:
    name: Update Helm Image Tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Updating reviews-service image tag to: $IMAGE_TAG"

          # FIX: use sed directly — simpler and no yaml library needed
          # Replaces the imageTag line under reviewsService block
          sed -i "s|  imageTag:.*# ← GitHub Actions updates this automatically|  imageTag: \"${IMAGE_TAG}\"    # ← GitHub Actions updates this automatically|" ${{ env.HELM_VALUES_PATH }}

          echo "Updated values.yaml:"
          grep -A 5 "reviewsService:" ${{ env.HELM_VALUES_PATH }} | head -10

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_VALUES_PATH }}
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "ci(helm): update reviews-service image tag to ${{ needs.build-and-push.outputs.image_tag }}"
          # Pull latest remote changes before pushing (other runs may have pushed commits)
          git pull --rebase origin main
          git push
