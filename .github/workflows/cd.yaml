# =============================================================================
# cd.yaml — Continuous Delivery Pipeline
#
# Triggers on:
#   - Push to main that changes Helm chart or K8s manifests
#
# What it does:
#   1. Lint Helm chart
#   2. Validate K8s manifests (dry-run)
#   3. Security scan manifests (checkov)
#   4. Notify ArgoCD to sync (optional — ArgoCD also auto-polls)
# =============================================================================

name: CD — Helm Validate & Sync

on:
  push:
    branches: [main]
    paths:
      - 'kind/helm/**'
      - 'kind/k8s/**'
      - '.github/workflows/cd.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'kind/helm/**'
      - 'kind/k8s/**'

jobs:
  # ── Job 1: Lint & Validate ───────────────────────────────────────────────────
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Helm lint
        run: |
          echo "Running helm lint..."
          helm lint kind/helm/ecommerce
          echo "✓ Helm chart is valid"

      - name: Helm template (dry-run render)
        run: |
          echo "Rendering Helm templates..."
          helm template ecommerce kind/helm/ecommerce --debug > /tmp/rendered.yaml
          echo "✓ Templates rendered successfully"
          echo "--- Rendered manifest line count ---"
          wc -l /tmp/rendered.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate manifests with kubectl dry-run
        run: |
          echo "Validating rendered manifests..."
          helm template ecommerce kind/helm/ecommerce | \
            kubectl apply --dry-run=client -f - || true
          echo "✓ Manifest validation complete"

  # ── Job 2: Security Scan ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Render Helm templates for scanning
        run: |
          helm template ecommerce kind/helm/ecommerce > /tmp/manifests.yaml

      # Checkov scans K8s manifests for security misconfigurations
      # e.g. containers running as root, missing resource limits, etc.
      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          file: /tmp/manifests.yaml
          framework: kubernetes
          # Don't fail the build on findings — just report them (for learning)
          soft_fail: true
        continue-on-error: true

  # ── Job 3: ArgoCD Sync (only on main push) ───────────────────────────────────
  argocd-sync:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Notify ArgoCD
        run: |
          echo "ArgoCD will automatically detect the git change and sync."
          echo "ArgoCD polls the repo every 3 minutes by default."
          echo "To force immediate sync, use the ArgoCD CLI or UI."
          echo ""
          echo "ArgoCD sync command (if CLI is configured):"
          echo "  argocd app sync ecommerce --auth-token \$ARGOCD_TOKEN"
