{{/*
deployments.yaml — Renders a Deployment + Service for every enabled service.

Instead of writing 11 separate Deployment files, we use a single template
and loop over each service's values block. This is the core power of Helm —
DRY (Don't Repeat Yourself) configuration.

For each service we render:
  - Deployment  (with probes, resources, env vars, anti-affinity)
  - Service     (ClusterIP pointing to the deployment)
*/}}

{{/* ------------------------------------------------------------------ */}}
{{/* frontend                                                             */}}
{{/* ------------------------------------------------------------------ */}}
{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["frontend"]
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: {{ printf "%s/%s:%s" .Values.global.imageRegistry .Values.frontend.image .Values.global.imageTag }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          env:
            {{- range $key, $val := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /_healthz
              port: {{ .Values.frontend.port }}
            failureThreshold: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_healthz
              port: {{ .Values.frontend.port }}
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-liveness-probe
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_healthz
              port: {{ .Values.frontend.port }}
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-readiness-probe
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.port }}
---
# NodePort for direct access without Ingress (http://localhost:30080)
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  namespace: {{ .Values.global.namespace }}
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
      nodePort: 30080
{{- end }}

---
{{/* ------------------------------------------------------------------ */}}
{{/* cartservice                                                          */}}
{{/* ------------------------------------------------------------------ */}}
{{- if .Values.cartservice.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: {{ .Values.global.namespace }}
  labels:
    app: cartservice
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cartservice.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["cartservice"]
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis-cart {{ .Values.redis.port }}; do sleep 2; done"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: cartservice
          image: {{ printf "%s/%s:%s" .Values.global.imageRegistry .Values.cartservice.image .Values.global.imageTag }}
          ports:
            - name: grpc
              containerPort: {{ .Values.cartservice.port }}
          env:
            {{- range $key, $val := .Values.cartservice.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.cartservice.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.cartservice.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.cartservice.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: {{ .Values.global.namespace }}
  labels:
    app: cartservice
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
    - name: grpc
      port: {{ .Values.cartservice.port }}
      targetPort: {{ .Values.cartservice.port }}
{{- end }}

