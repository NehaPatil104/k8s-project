# Services — stable network endpoints for each pod group.
# All backend services use ClusterIP (internal only).
# Only the frontend is exposed externally via NodePort + Ingress.
---
# Frontend — the only HTTP service (port 80 → container 8080)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ecommerce
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
# NodePort — direct access at http://localhost:30080 without Ingress
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  namespace: ecommerce
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080

