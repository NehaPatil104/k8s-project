# NetworkPolicies — zero-trust firewall between pods.
# Default: deny everything. Then explicitly allow only what's needed.
# Requires a CNI with NetworkPolicy support (Calico, Cilium).
# Kind's default CNI (kindnet) does NOT enforce these — install Calico to activate:
#   kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
---
# Deny all ingress and egress by default in this namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS (UDP/TCP 53) from all pods — without this, service discovery breaks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Frontend: receive from Ingress controller; send to all backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - podSelector:
            matchLabels:
              app: loadgenerator
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - port: 7070
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - port: 7000
    - to:
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 5050
    - to:
        - podSelector:
            matchLabels:
              app: recommendationservice
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: adservice
      ports:
        - port: 9555

---
# Cart service: receive from frontend and checkout; send to Redis only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cartservice-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 7070
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis-cart
      ports:
        - port: 6379

---
# Checkout: receive from frontend; send to cart, product, payment, shipping, email, currency
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkoutservice-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 5050
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - port: 7070
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: paymentservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: emailservice
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - port: 7000
