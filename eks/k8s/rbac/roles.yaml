# The frontend needs read access to ConfigMaps (e.g. feature flags).
# Other services use the default ServiceAccount with no extra permissions.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: ecommerce
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: ecommerce
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: ecommerce
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: frontend-role
