# Job — one-time task that runs to completion.
# Here it verifies all services are reachable after deployment.
# In production this might run DB migrations or data imports.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test-job
  namespace: ecommerce
  labels:
    app: smoke-test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: smoke-test
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-frontend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for frontend to be ready..."
              until wget -q --spider http://frontend:80/_healthz 2>/dev/null; do
                sleep 3
              done
              echo "Frontend is up!"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      containers:
        - name: smoke-test
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Smoke Tests ==="
              echo "Testing frontend..."
              wget -q -O /dev/null http://frontend:80 && echo "PASS: frontend /" || echo "FAIL: frontend /"
              wget -q -O /dev/null http://frontend:80/_healthz && echo "PASS: frontend /_healthz" || echo "FAIL: frontend /_healthz"
              echo ""
              echo "=== All smoke tests complete ==="
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
