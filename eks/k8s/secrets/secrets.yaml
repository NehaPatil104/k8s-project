# EKS Secrets Strategy
# =====================
# On Kind we used plain K8s Secrets (base64-encoded, not encrypted).
# On EKS we have two better options:
#
# Option A (used here for simplicity):
#   Still use K8s Secrets, but EKS encrypts etcd at rest using AWS KMS.
#   Enable with: --encryption-config in the cluster (done via Terraform).
#   Good enough for most use cases.
#
# Option B (production best practice):
#   Store secrets in AWS Secrets Manager and sync to K8s using
#   External Secrets Operator (ESO). The pod never sees the raw secret —
#   ESO fetches it from AWS and creates a K8s Secret automatically.
#   See: https://external-secrets.io
#
# We use Option A here. In a real production system, switch to Option B.
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: ecommerce
  annotations:
    # Document where this secret should really come from in production
    secret-source: "AWS Secrets Manager: ecommerce/jwt-secret"
type: Opaque
data:
  # base64 encoded — replace with real values
  # To encode: echo -n "your-secret" | base64
  JWT_SECRET: bXktc3VwZXItc2VjcmV0LWp3dC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24=
